{{- include "devplat.requireOpenClawConfig" . -}}
{{- $configData := .Values.config.data | default dict -}}
{{- if and .Values.config.enabled (hasKey $configData "openclaw.json") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devplat.fullname" . }}-config
  labels:
    {{- include "devplat.labels" . | nindent 4 }}
data:
  openclaw.json: |-
{{ get $configData "openclaw.json" | trimSuffix "\n" | indent 4 }}
{{- end }}
