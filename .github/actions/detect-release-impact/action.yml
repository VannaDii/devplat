name: Detect release impact
description: Determine whether a merged change should trigger dev package publishing.

outputs:
  has-changeset:
    description: Whether the diff contains a non-README changeset.
    value: ${{ steps.detect.outputs.has-changeset }}
  is-release-pr:
    description: Whether the PR head branch is a Changesets release branch.
    value: ${{ steps.detect.outputs.is-release-pr }}
  should-publish-dev-build:
    description: Whether the merged change should publish dev packages.
    value: ${{ steps.detect.outputs.should-publish-dev-build }}
  package-list:
    description: Comma-delimited package list extracted from changesets.
    value: ${{ steps.detect.outputs.package-list }}

runs:
  using: composite
  steps:
    - id: detect
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        BEFORE_SHA: ${{ github.event.before }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        HEAD_SHA: ${{ github.sha }}
        PR_MERGED: ${{ github.event.pull_request.merged }}
        PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: ./.github/actions/detect-release-impact/detect-impact.sh
