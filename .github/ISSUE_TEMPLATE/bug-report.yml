name: Bug report
description: Report a correctness, reliability, policy, workflow, or tooling defect.
title: '[Bug]: '
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: State the problem directly.
      placeholder: What is broken?
    validations:
      required: true
  - type: dropdown
    id: lifecycle_stage
    attributes:
      label: Lifecycle stage
      description: Which part of the platform lifecycle is failing?
      options:
        - Research
        - Spec PR
        - Human approval
        - Slicing
        - Implementation PR
        - Gates, review, or remediation
        - Operator control
        - Release surfaces
    validations:
      required: true
  - type: checkboxes
    id: release_surfaces
    attributes:
      label: Affected release surfaces
      description: Check every published surface affected by this defect.
      options:
        - label: GitHub Packages npm packages
        - label: GHCR Docker image
        - label: GHCR OCI Helm chart
        - label: GitHub Pages documentation site
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain why this matters.
      placeholder: What behavior, package, workflow, or operator action is affected?
    validations:
      required: true
  - type: textarea
    id: operator_impact
    attributes:
      label: Operator and audit impact
      description: Explain any GitHub, Discord, OpenClaw, or audit-trail impact.
      placeholder: Which operator flow, audit artifact, or control-plane action is affected?
  - type: textarea
    id: performance_impact
    attributes:
      label: Performance impact
      description: Note any latency, throughput, scan-cost, or benchmark regression.
      placeholder: What got slower or more expensive?
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide exact reproduction steps.
      placeholder: |
        1. nvm use
        2. npm ci
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or artifacts
      description: Include failing command output, artifact names, or links.
  - type: input
    id: packages
    attributes:
      label: Affected packages
      placeholder: '@vannadii/devplat-openclaw, @vannadii/devplat-discord'
