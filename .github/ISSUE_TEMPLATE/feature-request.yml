name: Feature request
description: Propose a new capability, workflow improvement, or package enhancement.
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Explain the current limitation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the expected behavior clearly.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and non-goals
      description: Note package boundaries, policy concerns, or things that must not change.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the outcomes that would make this complete.
    validations:
      required: true
  - type: input
    id: packages
    attributes:
      label: Target packages
      placeholder: '@vannadii/devplat-supervisor, @vannadii/devplat-policy'
