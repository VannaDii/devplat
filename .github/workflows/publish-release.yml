name: Publish Release

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish.
        required: false
        type: string
      dist-tag:
        description: npm dist-tag for the dev build.
        required: false
        default: dev
        type: string
      prerelease-id:
        description: Prerelease identifier prefix.
        required: false
        default: dev
        type: string
      package-list:
        description: Comma-delimited package list for manual dev publishing.
        required: false
        type: string

permissions:
  id-token: write
  contents: read
  packages: write
  pull-requests: read

jobs:
  publish:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && startsWith(github.event.pull_request.head.ref, 'changeset-release/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: '@vannadii'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify Node alignment
        run: npm run verify:node

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Publish stable packages
        run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload stable coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: stable-coverage-artifacts-${{ github.workflow }}-${{ github.ref_name }}-${{ github.sha }}
          retention-days: 14
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
            coverage/index.html
            coverage/**

      - name: Upload stable build artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: stable-build-artifacts-${{ github.workflow }}-${{ github.ref_name }}-${{ github.sha }}
          retention-days: 14
          path: |
            packages/*/dist/**
            packages/*/schemas/*.schema.json
            packages/openclaw/openclaw.plugin.json

  publish-dev-build:
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && !startsWith(github.event.pull_request.head.ref, 'changeset-release/'))
    runs-on: ubuntu-latest

    steps:
      - name: Resolve ref
        id: resolved
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "ref=${{ github.event.inputs.ref || github.ref }}" >> "$GITHUB_OUTPUT"
            echo "package_list=${{ github.event.inputs.package-list }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.pull_request.merge_commit_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ steps.resolved.outputs.ref }}
          fetch-depth: 0

      - name: Detect release impact
        id: detect-impact
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/detect-release-impact

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch' || steps.detect-impact.outputs.should-publish-dev-build == 'true'
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: '@vannadii'

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.detect-impact.outputs.should-publish-dev-build == 'true'
        run: npm ci --ignore-scripts

      - name: Verify Node alignment
        if: github.event_name == 'workflow_dispatch' || steps.detect-impact.outputs.should-publish-dev-build == 'true'
        run: npm run verify:node

      - name: Test with coverage
        if: github.event_name == 'workflow_dispatch' || steps.detect-impact.outputs.should-publish-dev-build == 'true'
        run: npm run test:coverage

      - name: Build
        if: github.event_name == 'workflow_dispatch' || steps.detect-impact.outputs.should-publish-dev-build == 'true'
        run: npm run build

      - name: Prepare dev publish
        id: prepare
        if: github.event_name == 'workflow_dispatch' || steps.detect-impact.outputs.should-publish-dev-build == 'true'
        shell: bash
        run: |
          short_sha="$(git rev-parse --short HEAD)"
          suffix="${{ github.event.inputs.prerelease-id || 'dev' }}.${{ github.run_number }}.${short_sha}"
          package_list="${{ steps.detect-impact.outputs.package-list || steps.resolved.outputs.package_list }}"
          node scripts/prepare-dev-publish.mjs --suffix "${suffix}" --out-dir "${RUNNER_TEMP}/dev-publish" --packages "${package_list}" > "${RUNNER_TEMP}/dev-publish-manifest.json"
          echo "suffix=${suffix}" >> "$GITHUB_OUTPUT"
          echo "manifest=${RUNNER_TEMP}/dev-publish-manifest.json" >> "$GITHUB_OUTPUT"

      - name: Publish dev packages
        if: github.event_name == 'workflow_dispatch' || steps.detect-impact.outputs.should-publish-dev-build == 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq -r '.packages[].dir' "${{ steps.prepare.outputs.manifest }}" | while read -r dir; do
            npm publish --tag "${{ github.event.inputs.dist-tag || 'dev' }}" "$dir"
          done

      - name: Upload dev coverage artifacts
        if: always() && (github.event_name == 'workflow_dispatch' || steps.detect-impact.outputs.should-publish-dev-build == 'true')
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dev-coverage-artifacts-${{ github.workflow }}-${{ github.ref_name }}-${{ github.sha }}
          retention-days: 14
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
            coverage/index.html
            coverage/**

      - name: Upload dev publish artifacts
        if: always() && (github.event_name == 'workflow_dispatch' || steps.detect-impact.outputs.should-publish-dev-build == 'true')
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dev-publish-artifacts-${{ github.workflow }}-${{ github.ref_name }}-${{ github.sha }}
          retention-days: 14
          path: |
            ${{ runner.temp }}/dev-publish/**
            packages/*/dist/**

      - name: Skip summary
        if: github.event_name == 'pull_request' && steps.detect-impact.outputs.should-publish-dev-build != 'true'
        run: echo "Skipping dev publish."
