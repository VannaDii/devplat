name: Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Node alignment
        run: npm run verify:node

      - name: Resolve metadata
        id: meta_vars
        shell: bash
        run: |
          echo "node_version=$(tr -d 'v' < .nvmrc)" >> "$GITHUB_OUTPUT"
          echo "registry_owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          package_version="$(
            node --input-type=module -e "import { readFileSync } from 'node:fs'; console.log(JSON.parse(readFileSync('packages/openclaw/package.json', 'utf8')).version);"
          )"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5.8.0
        with:
          images: ghcr.io/${{ steps.meta_vars.outputs.registry_owner }}/devplat-openclaw-runtime
          tags: |
            type=raw,value=${{ steps.meta_vars.outputs.package_version }}
            type=raw,value=latest
            type=sha

      - name: Build and publish image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: docker/openclaw-runtime/Dockerfile
          push: true
          build-args: |
            NODE_VERSION=${{ steps.meta_vars.outputs.node_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
