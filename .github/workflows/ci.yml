name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  setup:
    name: Setup and verify Node alignment
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Node alignment
        run: npm run verify:node

  generated:
    name: Generate committed artifacts
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate committed artifacts
        run: npm run prepare:generated

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: generated-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            packages/*/schemas/*.schema.json
            packages/openclaw/openclaw.plugin.json

  repo:
    name: Verify repository structure
    runs-on: ubuntu-latest
    needs:
      - setup
      - generated

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download generated artifacts
        uses: actions/download-artifact@v5.0.0
        with:
          name: generated-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

      - name: Verify repository structure
        run: npm run check:repo

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs:
      - setup
      - generated

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download generated artifacts
        uses: actions/download-artifact@v5.0.0
        with:
          name: generated-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

      - name: Lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs:
      - setup
      - generated

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download generated artifacts
        uses: actions/download-artifact@v5.0.0
        with:
          name: generated-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

      - name: Typecheck
        run: npm run typecheck:workspace

  test:
    name: Test with coverage
    runs-on: ubuntu-latest
    needs:
      - setup
      - generated
      - typecheck

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download generated artifacts
        uses: actions/download-artifact@v5.0.0
        with:
          name: generated-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

      - name: Test with coverage
        run: npm run test:coverage:workspace

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
            coverage/index.html
            coverage/**

  build:
    name: Build and upload artifacts
    runs-on: ubuntu-latest
    needs:
      - setup
      - generated
      - typecheck

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download generated artifacts
        uses: actions/download-artifact@v5.0.0
        with:
          name: generated-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

      - name: Build
        run: npm run build:workspace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: build-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            packages/*/dist/**
            packages/*/schemas/*.schema.json
            packages/openclaw/openclaw.plugin.json

  docs:
    name: Build and upload docs
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: docs-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            site/guide-docs/.vitepress/dist/**

  sonar:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs:
      - build
      - test
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Cache Sonar packages
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/cache@v5.0.4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download coverage artifacts
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/download-artifact@v5.0.0
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

      - name: Sonar scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        with:
          args: >
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
