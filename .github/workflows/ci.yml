name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Cache Sonar packages
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/cache@v4.2.4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Derive artifact metadata
        id: artifact_meta
        shell: bash
        env:
          PR_HEAD_REF: ${{ github.head_ref || '' }}
        run: |
          ref_name="${PR_HEAD_REF:-$GITHUB_REF_NAME}"
          safe_ref_name="$(printf '%s' "$ref_name" | sed 's#[\"/:<>|*?\\]#-#g' | tr -s '-')"
          safe_workflow_name="$(printf '%s' "$GITHUB_WORKFLOW" | sed 's#[\"/:<>|*?\\]#-#g' | tr -s '-')"
          short_sha="$(git rev-parse --short=12 "$GITHUB_SHA")"

          echo "safe_ref_name=${safe_ref_name}" >> "$GITHUB_OUTPUT"
          echo "safe_workflow_name=${safe_workflow_name}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Verify Node alignment
        run: npm run verify:node

      - name: Generate committed artifacts
        id: generated
        continue-on-error: true
        run: npm run prepare:generated

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck

      - name: Test with coverage
        id: test
        continue-on-error: true
        run: npm run test:coverage

      - name: Build
        id: build
        continue-on-error: true
        run: npm run build

      - name: Check schemas
        id: check_schemas
        continue-on-error: true
        run: npm run check:schemas

      - name: Check unit tests
        id: check_unit_tests
        continue-on-error: true
        run: npm run check:unit-tests

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: build-artifacts-${{ steps.artifact_meta.outputs.safe_workflow_name }}-${{ steps.artifact_meta.outputs.safe_ref_name }}-${{ steps.artifact_meta.outputs.short_sha }}
          retention-days: 14
          path: |
            packages/*/dist/**
            packages/*/schemas/*.schema.json
            packages/openclaw/openclaw.plugin.json

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: coverage-artifacts-${{ steps.artifact_meta.outputs.safe_workflow_name }}-${{ steps.artifact_meta.outputs.safe_ref_name }}-${{ steps.artifact_meta.outputs.short_sha }}
          retention-days: 14
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
            coverage/index.html
            coverage/**

      - name: Sonar scan
        if: ${{ env.SONAR_TOKEN != '' && steps.test.outcome == 'success' && steps.build.outcome == 'success' }}
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        with:
          args: >
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Fail if verification failed
        if: always()
        shell: bash
        run: |
          failures=0
          for outcome in \
            "${{ steps.generated.outcome }}" \
            "${{ steps.lint.outcome }}" \
            "${{ steps.typecheck.outcome }}" \
            "${{ steps.test.outcome }}" \
            "${{ steps.build.outcome }}" \
            "${{ steps.check_schemas.outcome }}" \
            "${{ steps.check_unit_tests.outcome }}"; do
            if [[ "$outcome" != "success" ]]; then
              failures=1
            fi
          done

          exit "$failures"
