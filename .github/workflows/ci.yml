name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  setup:
    name: Setup and verify Node alignment
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Node alignment
        run: npm run verify:node

  generated:
    name: Generate committed artifacts
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate committed artifacts
        run: npm run prepare:generated

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: generated-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            packages/*/schemas/*.schema.json
            packages/openclaw/openclaw.plugin.json

  repo:
    name: Verify repository structure
    runs-on: ubuntu-latest
    needs:
      - setup
      - generated

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download generated artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: generated-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

      - name: Verify repository structure
        env:
          BRANCH_NAME: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          PR_TITLE: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || '' }}
        run: npm run check:repo

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs:
      - setup
      - generated

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download generated artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: generated-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

      - name: Lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs:
      - setup
      - generated

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download generated artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: generated-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

      - name: Typecheck
        run: npm run typecheck:workspace

  test:
    name: Test with coverage
    runs-on: ubuntu-latest
    needs:
      - setup
      - generated
      - typecheck

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download generated artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: generated-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

      - name: Test with coverage
        run: npm run test:coverage:workspace

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: coverage

  build:
    name: Build and upload artifacts
    runs-on: ubuntu-latest
    needs:
      - setup
      - generated
      - typecheck

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download generated artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: generated-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

      - name: Build
        run: npm run build:workspace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: build-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            packages/*/dist/**
            packages/*/schemas/*.schema.json
            packages/openclaw/openclaw.plugin.json

  docs:
    name: Build and upload docs
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: docs-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            site/guide-docs/.vitepress/dist/**

  sonar:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs:
      - build
      - test
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Verify Sonar token
        shell: bash
        run: |
          test -n "${SONAR_TOKEN}"

      - name: Cache Sonar packages
        uses: actions/cache@v5.0.4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: .artifacts/coverage

      - name: Restore coverage directory
        shell: bash
        run: |
          rm -rf coverage

          if [[ -f .artifacts/coverage/coverage/lcov.info ]]; then
            cp -R .artifacts/coverage/coverage ./coverage
          elif [[ -f .artifacts/coverage/lcov.info ]]; then
            mkdir -p coverage
            cp -R .artifacts/coverage/. ./coverage/
          else
            echo "Expected LCOV report was not found in downloaded coverage artifact." >&2
            find .artifacts/coverage -maxdepth 3 -type f | sort >&2 || true
            exit 1
          fi

          test -f coverage/lcov.info

      - name: Sonar scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        with:
          args: >
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
