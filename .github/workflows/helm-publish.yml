name: Publish Helm Chart

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Helm Chart
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.pull_request.merge_commit_sha }}

      - name: Create DevPlat bot token
        id: devplat_bot_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          owner: ${{ github.repository_owner }}
          permission-packages: write
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Node alignment
        run: npm run verify:node

      - name: Resolve publish metadata
        id: publish_meta
        shell: bash
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          package_version="$(
            node --input-type=module -e "import { readFileSync } from 'node:fs'; console.log(JSON.parse(readFileSync('packages/openclaw/package.json', 'utf8')).version);"
          )"
          short_sha="$(git rev-parse --short=12 HEAD)"

          if [[ -n "$PR_HEAD_REF" && "$PR_HEAD_REF" == changeset-release/* ]]; then
            chart_version="$package_version"
            image_tag="$package_version"
          else
            chart_version="${package_version}-dev.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
            image_tag="${package_version}-dev.${GITHUB_RUN_NUMBER}.${short_sha}"
          fi

          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${chart_version}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Stage chart payload
        id: stage
        run: |
          node scripts/stage-helm-chart.mjs \
            --out-dir "${RUNNER_TEMP}/helm-chart" \
            --chart-version "${{ steps.publish_meta.outputs.chart_version }}" \
            --app-version "${{ steps.publish_meta.outputs.image_tag }}" \
            --image-tag "${{ steps.publish_meta.outputs.image_tag }}" \
            > "${RUNNER_TEMP}/helm-chart-manifest.json"
          echo "chart_dir=${RUNNER_TEMP}/helm-chart" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Lint chart
        run: helm lint "${{ steps.stage.outputs.chart_dir }}"

      - name: Package chart
        run: |
          mkdir -p .artifacts/helm
          helm package "${{ steps.stage.outputs.chart_dir }}" --destination .artifacts/helm

      - name: Log in to GHCR OCI registry
        run: echo "${{ steps.devplat_bot_token.outputs.token }}" | helm registry login ghcr.io -u "${{ steps.devplat_bot_token.outputs.app-slug }}[bot]" --password-stdin

      - name: Publish chart
        run: |
          chart_archive="$(find .artifacts/helm -maxdepth 1 -name 'devplat-*.tgz' | head -n 1)"
          test -n "$chart_archive"
          helm push "$chart_archive" "oci://ghcr.io/${{ steps.publish_meta.outputs.owner }}/charts"
