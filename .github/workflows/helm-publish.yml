name: Publish Helm Chart

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Helm Chart
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Node alignment
        run: npm run verify:node

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1

      - name: Lint chart
        run: helm lint deploy/helm/devplat

      - name: Package chart
        run: |
          mkdir -p .artifacts/helm
          helm package deploy/helm/devplat --destination .artifacts/helm

      - name: Log in to GHCR OCI registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish chart
        run: |
          chart_archive="$(find .artifacts/helm -maxdepth 1 -name 'devplat-*.tgz' | head -n 1)"
          test -n "$chart_archive"
          helm push "$chart_archive" "oci://ghcr.io/${{ github.repository_owner }}/charts"
